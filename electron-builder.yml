appId: com.pablopunk.nvm
productName: Nevermind
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
files:
  - dist/**
  - src/electron/**
  - src/docs/**
  - src/resources/**
  - package.json
mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch:
        - arm64
        - x64
linux:
  category: Utility
  target:
    - AppImage
    - deb
win:
  target:
    - nsis
    - portable
