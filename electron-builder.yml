appId: com.pablopunk.nvm
productName: Nevermind
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - src/docs/**
  - from: src/resources
    to: src/resources
    filter:
      - '**/*'
  - LICENSE
  - package.json
  - '!**/*.map'
  - '!node_modules/**/{test,tests,__tests__,docs,example,examples}/**'
asar: true
publish:
  - provider: github
    owner: pablopunk
    repo: nvm
mac:
  icon: build/Icon.icon
  category: public.app-category.productivity
  target:
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    NSCameraUsageDescription: Nevermind needs camera access for extensions that display a live camera view.
  artifactName: '${productName}-${version}-mac-${arch}.${ext}'
linux:
  icon: build/Icon.icon/Assets/icon.png
  category: Utility
  maintainer: Pablo Varela <pablo@pablopunk.com>
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-linux-${arch}.${ext}'
win:
  target:
    - nsis
    - portable
  artifactName: '${productName}-${version}-win-${arch}.${ext}'
electronUpdaterCompatibility: '>=2.16'
