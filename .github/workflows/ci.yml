name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      electron_smoke_changed: ${{ steps.app-changes.outputs.changed }}
      windows_package_changed: ${{ steps.windows-package-changes.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Classify Electron smoke changes
        id: app-changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          changed="$(git diff --name-only "$BASE" HEAD | mise exec -- node .github/scripts/electron-smoke-paths.cjs)"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Classify Windows package changes
        id: windows-package-changes
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          changed="$(git diff --name-only "$BASE" HEAD | mise exec -- node .github/scripts/windows-package-paths.cjs)"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Changed-file lint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only "$BASE" | grep -v '^backend/' | grep -v '^\.github/' | grep -E '\.(cjs|cts|js|json|jsonc|jsx|mjs|mts|ts|tsx)$' || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs mise exec -- pnpm exec biome check --error-on-warnings --assist-enabled=false --skip=suspicious --skip=style --skip=a11y --skip=performance --skip=complexity
          else
            echo "Only non-frontend files changed; skipping biome check"
          fi

      - name: Verify
        run: mise exec -- pnpm verify

  electron-smoke:
    name: Linux Electron smoke
    if: >-
      github.event_name == 'pull_request' &&
      needs.check.outputs.electron_smoke_changed == 'true'
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: mise exec -- pnpm build

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install --yes xvfb

      - name: Electron smoke
        run: xvfb-run -a mise exec -- pnpm test:electron

      - name: Upload Linux palette screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-palette-screenshot
          path: test-results/electron/linux-palette.png
          if-no-files-found: error
          retention-days: 7

      - name: Upload Electron failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-artifacts
          path: test-results/electron
          if-no-files-found: warn

  windows-first-run:
    name: Windows first-run Electron
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install standalone pnpm 11.13.0
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'pnpm-win32-x64.zip'
          $destination = Join-Path $env:RUNNER_TEMP 'pnpm-standalone'
          Invoke-WebRequest `
            -Uri 'https://github.com/pnpm/pnpm/releases/download/v11.13.0/pnpm-win32-x64.zip' `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $destination
          $pnpm = Join-Path $destination 'pnpm.exe'
          $destination | Out-File `
            -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PNPM_STANDALONE_PATH=$pnpm" | Out-File `
            -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $pnpm --version

      - name: Root pnpm install with Electron payload skipped
        shell: pwsh
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: '& $env:PNPM_STANDALONE_PATH install --frozen-lockfile'

      - name: Extension persistence tests
        shell: pwsh
        run: >-
          & $env:PNPM_STANDALONE_PATH -C backend exec node --import tsx --test
          "../src/electron/extension-json-store.test.ts"
          "../src/electron/extension-storage.test.ts"
          "../src/electron/data-loader.test.ts"

      - name: Root pnpm run dev repairs Electron and starts the app
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: node .github/scripts/windows-first-run-smoke.cjs

  windows-package-smoke:
    name: Windows unsigned package smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
      needs.check.outputs.windows_package_changed == 'true')
    needs: check
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Prepare deterministic Windows evidence directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path windows-artifacts/startup-evidence -Force | Out-Null
          New-Item -ItemType File -Path windows-artifacts/startup-evidence/harness.log -Force | Out-Null

      - name: Aggregate verification
        run: mise exec -- pnpm verify

      - name: Build unsigned Windows x64 NSIS and portable packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: mise exec -- pnpm run dist:win:x64

      - name: Reject a package missing its ASAR, then verify the untouched build
        shell: pwsh
        run: |
          $version = mise exec -- node -p "require('./package.json').version"
          $asar = (Resolve-Path 'node_modules/.bin/asar.CMD').Path
          $negativeRoot = Join-Path $env:RUNNER_TEMP 'windows-package-negative'
          Copy-Item -LiteralPath release -Destination $negativeRoot -Recurse
          Remove-Item -LiteralPath (Join-Path $negativeRoot 'win-unpacked/resources/app.asar') -Force
          $negative = Start-Process pwsh -Wait -PassThru -ArgumentList @(
            '-NoProfile', '-File', '.github/scripts/verify-windows-package.ps1',
            '-PackageRoot', $negativeRoot,
            '-ExpectedVersion', $version,
            '-ExpectedArch', 'x64',
            '-AsarExecutable', $asar,
            '-UpdaterMetadataPolicy', 'Nsis'
          )
          if ($negative.ExitCode -eq 0) { throw 'Verifier accepted a package missing app.asar.' }
          Remove-Item -LiteralPath $negativeRoot -Recurse -Force
          & .github/scripts/verify-windows-package.ps1 `
            -PackageRoot (Resolve-Path release).Path `
            -ExpectedVersion $version `
            -ExpectedArch x64 `
            -AsarExecutable $asar `
            -UpdaterMetadataPolicy Nsis

      - name: Verify inherited Windows ACL privacy for representative secrets
        shell: pwsh
        run: |
          $fixture = Join-Path $env:APPDATA "NevermindAclSmoke-$env:GITHUB_RUN_ID"
          try {
            mise exec -- pnpm exec tsx scripts/create-windows-private-file-fixture.ts $fixture
            & .github/scripts/verify-windows-private-file-acl.ps1 -FixtureRoot $fixture
          } finally {
            if (Test-Path -LiteralPath $fixture) { Remove-Item -LiteralPath $fixture -Recurse -Force }
          }

      - name: Stage deterministic smoke artifacts
        shell: pwsh
        run: |
          $version = mise exec -- node -p "require('./package.json').version"
          New-Item -ItemType Directory -Path windows-artifacts/startup-evidence -Force | Out-Null
          New-Item -ItemType File -Path windows-artifacts/startup-evidence/harness.log -Force | Out-Null
          Copy-Item "release/Nevermind-$version-win-x64-setup.exe" windows-artifacts/
          Copy-Item "release/Nevermind-$version-win-x64-setup.exe.blockmap" windows-artifacts/
          Copy-Item "release/Nevermind-$version-win-x64-portable.exe" windows-artifacts/
          Copy-Item release/latest.yml windows-artifacts/
          Copy-Item release/windows-smoke-manifest.json windows-artifacts/

      - name: Launch the staged portable package and prove renderer readiness
        shell: pwsh
        run: |
          $version = mise exec -- node -p "require('./package.json').version"
          node scripts/windows-portable-smoke.cjs `
            "windows-artifacts/Nevermind-$version-win-x64-portable.exe" `
            windows-artifacts/windows-smoke-manifest.json `
            windows-artifacts 2>&1 | Tee-Object windows-artifacts/startup-evidence/harness.log
          if ($LASTEXITCODE -ne 0) { throw 'Packaged portable startup failed.' }

      - name: Upload deterministic Windows smoke artifacts and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nevermind-windows-x64-smoke-${{ github.sha }}
          path: windows-artifacts
          if-no-files-found: error
          retention-days: 7

  postgres-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Postgres integration
        env:
          NVM_TEST_ADMIN_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: mise exec -- pnpm -C backend test:postgres-integration

  release-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build unsigned Windows x64 NSIS and portable packages
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: mise exec -- pnpm run dist:win:x64

      - name: Verify unsigned Windows release packages
        shell: pwsh
        run: |
          $version = mise exec -- node -p "require('./package.json').version"
          $asar = (Resolve-Path 'node_modules/.bin/asar.CMD').Path
          & .github/scripts/verify-windows-package.ps1 `
            -PackageRoot (Resolve-Path release).Path `
            -ExpectedVersion $version `
            -ExpectedArch x64 `
            -AsarExecutable $asar `
            -UpdaterMetadataPolicy Nsis

      - name: Collect Windows release artifacts
        shell: pwsh
        run: |
          $version = mise exec -- node -p "require('./package.json').version"
          New-Item -ItemType Directory -Path windows-release-artifacts -Force | Out-Null
          $artifacts = @(
            "release/Nevermind-$version-win-x64-setup.exe",
            "release/Nevermind-$version-win-x64-setup.exe.blockmap",
            "release/Nevermind-$version-win-x64-portable.exe",
            'release/latest.yml'
          )
          foreach ($artifact in $artifacts) {
            $file = Get-Item -LiteralPath $artifact
            if ($file.Length -eq 0) { throw "$artifact is empty." }
            Copy-Item -LiteralPath $file.FullName -Destination windows-release-artifacts/
          }
          $collected = @(Get-ChildItem -LiteralPath windows-release-artifacts -File)
          if ($collected.Count -ne $artifacts.Count) {
            throw "Expected $($artifacts.Count) release artifacts; found $($collected.Count)."
          }

      - name: Upload Windows release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) { throw "Unable to create or find release $tag." }
            }
          }
          $artifacts = Get-ChildItem -LiteralPath windows-release-artifacts -File |
            ForEach-Object { $_.FullName }
          gh release upload $tag @artifacts --clobber
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload Windows artifacts to $tag." }

  release-mac:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Import Apple signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

      - name: Build signed/notarized macOS release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
        run: mise exec -- pnpm run dist:mac:${{ matrix.arch }}

      - name: Collect macOS artifacts
        run: |
          mkdir -p mac-artifacts
          shopt -s nullglob
          files=(
            release/Nevermind-*-mac-${{ matrix.arch }}.zip
            release/Nevermind-*-mac-${{ matrix.arch }}.zip.blockmap
          )
          if (( ${#files[@]} == 0 )); then
            find release -maxdepth 1 -type f -print
            exit 1
          fi
          cp "${files[@]}" mac-artifacts/

          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            cp release/latest-mac.yml mac-artifacts/
          elif [[ -f release/latest-mac-x64.yml ]]; then
            cp release/latest-mac-x64.yml mac-artifacts/
          fi

      - name: Upload macOS dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nevermind-mac-${{ matrix.arch }}-${{ github.sha }}
          path: mac-artifacts/*
          if-no-files-found: error

      - name: Upload macOS release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes || gh release view "$tag" >/dev/null
          fi
          gh release upload "$tag" mac-artifacts/* --clobber

  release-linux:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            appimage-arch: x86_64
            deb-arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            appimage-arch: arm64
            deb-arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install Linux packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build Linux release
        run: mise exec -- pnpm run dist:linux:${{ matrix.arch }}

      - name: Generate Linux AppImage blockmap
        run: |
          set -euo pipefail
          mapfile -t appimages < <(find release -maxdepth 1 -type f -name 'Nevermind-*-linux-${{ matrix.appimage-arch }}.AppImage' -print)
          if (( ${#appimages[@]} != 1 )); then
            printf 'Expected one AppImage, found %s\n' "${#appimages[@]}" >&2
            find release -maxdepth 1 -type f -print >&2
            exit 1
          fi
          mise exec -- node scripts/generate-linux-appimage-blockmap.cjs "${appimages[0]}"

      - name: Collect Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p linux-artifacts
          mapfile -t appimages < <(find release -maxdepth 1 -type f -name 'Nevermind-*-linux-${{ matrix.appimage-arch }}.AppImage' -print)
          mapfile -t debs < <(find release -maxdepth 1 -type f -name 'Nevermind-*-linux-${{ matrix.deb-arch }}.deb' -print)
          mapfile -t blockmaps < <(find release -maxdepth 1 -type f -name 'Nevermind-*-linux-${{ matrix.appimage-arch }}.AppImage.blockmap' -print)
          for artifact in appimages debs blockmaps; do
            declare -n files="$artifact"
            if (( ${#files[@]} != 1 )); then
              printf 'Expected one %s, found %s\n' "$artifact" "${#files[@]}" >&2
              find release -maxdepth 1 -type f -print >&2
              exit 1
            fi
            [[ -s "${files[0]}" ]]
          done
          cp "${appimages[0]}" "${debs[0]}" "${blockmaps[0]}" linux-artifacts/

          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            metadata=release/latest-linux.yml
            destination=linux-artifacts/latest-linux.yml
          elif [[ -f release/latest-linux-arm64.yml ]]; then
            metadata=release/latest-linux-arm64.yml
            destination=linux-artifacts/latest-linux-arm64.yml
          else
            metadata=release/latest-linux.yml
            destination=linux-artifacts/latest-linux-arm64.yml
          fi
          [[ -s "$metadata" ]]
          cp "$metadata" "$destination"
          [[ "$(find linux-artifacts -maxdepth 1 -type f -print | wc -l | tr -d ' ')" == 4 ]]
          find linux-artifacts -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Validate Linux updater metadata
        run: >-
          mise exec -- node scripts/validate-linux-updater-metadata.cjs
          linux-artifacts/latest-linux${{ matrix.arch == 'arm64' && '-arm64' || '' }}.yml
          linux-artifacts

      - name: Upload Linux dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nevermind-linux-${{ matrix.arch }}-${{ github.sha }}
          path: linux-artifacts/*
          if-no-files-found: error

      - name: Upload Linux release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes || gh release view "$tag" >/dev/null
          fi
          gh release upload "$tag" linux-artifacts/* --clobber
