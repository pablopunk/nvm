name: Report Linux palette screenshot

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: report-linux-palette-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: false

jobs:
  report:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout trusted reporter
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Find passing Linux palette screenshot
        id: screenshot
        uses: actions/github-script@v8
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reporter = require(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/report-linux-palette-screenshot.cjs`,
            );
            const artifact = await reporter.findScreenshotArtifact({
              core,
              github,
              owner: context.repo.owner,
              repo: context.repo.repo,
              runId: Number(process.env.RUN_ID),
            });
            core.setOutput('found', artifact ? 'true' : 'false');
            if (artifact) core.setOutput('artifact-id', String(artifact.id));

      - name: Download passing Linux palette screenshot
        if: steps.screenshot.outputs.found == 'true'
        uses: actions/download-artifact@v5
        with:
          artifact-ids: ${{ steps.screenshot.outputs.artifact-id }}
          path: ${{ runner.temp }}/linux-palette-screenshot
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish screenshot and update pull request comment
        if: steps.screenshot.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          SCREENSHOT_PATH: ${{ runner.temp }}/linux-palette-screenshot/linux-palette.png
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reporter = require(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/report-linux-palette-screenshot.cjs`,
            );
            await reporter.publishScreenshotReport({
              core,
              env: process.env,
              github,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
